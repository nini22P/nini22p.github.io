{% extends "hook/templates/page.html" %}

{% block content %}
{{ super() }}
{% if page.date %}
<div id="disqus_thread"></div>
<script>
    var disqus_config = function () {
        this.page.url = '{{ page.permalink | safe }}';
        this.page.identifier = '{{ page.slug }}';
    };
    (function() {
        var d = document, s = d.createElement('script');
        s.src = 'https://{{ config.extra.disqus_shortname }}.disqus.com/embed.js';
        s.setAttribute('data-timestamp', +new Date());
        (d.head || d.body).appendChild(s);
    })();
</script>
<noscript>请启用 JavaScript 以查看 <a href="https://disqus.com/?ref_noscript">Disqus 评论</a>。</noscript>
{% endif %}
{% endblock content %}
